<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesFlix - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }
        .auth-card {
            background-color: rgba(0, 0, 0, 0.75);
            padding: 60px;
            border-radius: 4px;
            width: 450px;
            text-align: center;
        }
        .auth-card h1 {
            color: #fff;
            margin-bottom: 28px;
            font-size: 32px;
            font-weight: 700;
        }
        .auth-card .form-group {
            margin-bottom: 16px;
        }
        .auth-card .form-group input {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }
        .auth-card button {
            width: 100%;
            padding: 16px;
            margin-top: 24px;
            border: none;
            border-radius: 4px;
            background-color: #E50914;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .auth-card button:hover {
            background-color: #f6121d;
        }
        .auth-card .links {
            margin-top: 16px;
            color: #737373;
            font-size: 16px;
        }
        .auth-card .links a {
            color: #fff;
            text-decoration: none;
        }
        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #fff;
            background-color: #e87c03;
            font-size: 14px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="/" style="text-decoration: none; color: #E50914; font-size: 40px; font-weight: 900; margin-bottom: 30px; display: block; font-family: 'Outfit', sans-serif;">Notes<span>Flix</span></a>
        <h1>Sign Up</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('signup') }}" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="text" name="student_id" placeholder="Student ID" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Sign Up</button>
            <div class="links">
                Already have an account? <a href="{{ url_for('login') }}">Sign In.</a>
            </div>
        </form>
    </div>
</body>
</html>
